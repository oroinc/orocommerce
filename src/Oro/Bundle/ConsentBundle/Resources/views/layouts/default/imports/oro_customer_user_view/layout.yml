layout:
    imports:
        -
            id: oro_consent_list
            namespace: edit_profile_view
            root: customer_user_view_information_data_protection
    actions:
        - '@setBlockTheme':
            themes: 'data_protection.html.twig'

        - '@addTree':
            items:
                customer_user_view_information_data_protection_container:
                    blockType: container
                customer_user_view_information_data_protection:
                    blockType: container
                    prepend: false
                    options:
                        visible: '=data["oro_frontend_consent_provider"].getAllConsentData() and data["oro_frontend_consent_provider"].isCustomerUserCurrentlyLoggedIn(data["entity"])'
            tree:
                customer_user_sign_data_view_information_container:
                    customer_user_view_information_data_protection: ~
