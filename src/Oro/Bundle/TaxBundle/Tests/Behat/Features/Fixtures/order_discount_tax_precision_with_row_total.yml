Oro\Bundle\SegmentBundle\Entity\Segment:
    promotionSegment:
        name: 'All Products Segment'
        entity: 'Oro\Bundle\ProductBundle\Entity\Product'
        type: '@segment_dynamic_type'
        definition: <('{"filters":[],"columns":[{"name":"id","label":"id","sorting":null,"func":null}]}')>
        organization: '@organization'
        owner: '@business_unit'

Oro\Bundle\RuleBundle\Entity\Rule:
    discount100Rule:
        name: 'Order Discount 100 USD'
        sortOrder: 1
        enabled: true

Oro\Bundle\PromotionBundle\Entity\DiscountConfiguration:
    discount100Config:
        type: 'order'
        options:
            discount_type: 'amount'
            discount_currency: 'USD'
            discount_value: 100

Oro\Bundle\PromotionBundle\Entity\Promotion:
    discount100Promotion:
        __calls:
            - addScope: ['@default_scope']
        productsSegment: '@promotionSegment'
        rule: '@discount100Rule'
        discountConfiguration: '@discount100Config'
        organization: '@organization'
        owner: '@admin'
