Oro\Bundle\CustomerBundle\Entity\Customer:
    customer1:
        name: 'Customer1'
        organization: '@organization'
        owner: '@admin'
        taxCode: '@customer_tax_code_non_exempt'
        payment_term_7c4f1e8e: '@paymentTerm'

Oro\Bundle\CustomerBundle\Entity\CustomerUser:
    amanda:
        email: 'AmandaRCole@example.org'
        username: 'AmandaRCole@example.org'
        password: <userPassword(@amanda->username)>
        firstName: 'Amanda'
        lastName: 'Cole'
        enabled: '1'
        confirmed: '1'
        customer: '@customer1'
        organization: '@organization'
        userRoles: ['@front_admin']
        owner: '@admin'
        website: '@website1'

Oro\Bundle\CustomerBundle\Entity\CustomerAddress:
    customerAddress:
        region: '@florida'
        frontendOwner: '@customer1'
        country: '@united_states'
        owner: '@admin'
        systemOrganization: '@organization'
        firstName: 'Test'
        lastName: 'Customer'
        primary: true
        label: 'Primary address'
        street: '801 Scenic Hwy'
        city: 'Haines City'
        postalCode: '33844'
        organization: 'ORO'

Oro\Bundle\CustomerBundle\Entity\CustomerAddressToAddressType:
    customerAddressShipping:
        address: '@customerAddress'
        type: '@shippingType'
        default: true
    customerAddressBilling:
        address: '@customerAddress'
        type: '@billingType'
        default: true

Oro\Bundle\TaxBundle\Entity\ProductTaxCode:
    taxable_vat22:
        code: 'TAXABLE_VAT22'
        organization: '@organization'

Oro\Bundle\TaxBundle\Entity\CustomerTaxCode:
    customer_tax_code_non_exempt:
        owner: '@admin'
        organization: '@organization'
        code: 'NON_EXEMPT'

Oro\Bundle\TaxBundle\Entity\Tax:
    tax_vat_22:
        code: 'VAT_22'
        rate: 0.22

Oro\Bundle\TaxBundle\Entity\TaxJurisdiction:
    tax_jurisdiction_florida:
        code: 'TAX_JURISDICTION_FLORIDA'
        country: '@united_states'
        region: '@florida'

Oro\Bundle\TaxBundle\Entity\TaxRule:
    tax_rule_vat22:
        productTaxCode: '@taxable_vat22'
        customerTaxCode: '@customer_tax_code_non_exempt'
        tax: '@tax_vat_22'
        taxJurisdiction: '@tax_jurisdiction_florida'
        organization: '@organization'

Oro\Bundle\ProductBundle\Entity\ProductUnitPrecision:
    product1_precision:
        unit: '@piece'
        precision: '2'
    product2_precision:
        unit: '@piece'
        precision: '2'
    product3_precision:
        unit: '@piece'
        precision: '2'

Oro\Bundle\ProductBundle\Entity\Product:
    product1:
        type: 'simple'
        organization: '@organization'
        owner: '@business_unit'
        sku: 'DISCOUNT-TAX-P1'
        attributeFamily: '@defaultProductFamily'
        primaryUnitPrecision: '@product1_precision'
        inventoryStatus: '@enumInventoryStatuses'
        status: 'enabled'
        taxCode: '@taxable_vat22'
        __calls:
            - setDefaultName: ['Product 1 VAT22']
    product2:
        type: 'simple'
        organization: '@organization'
        owner: '@business_unit'
        sku: 'DISCOUNT-TAX-P2'
        attributeFamily: '@defaultProductFamily'
        primaryUnitPrecision: '@product2_precision'
        inventoryStatus: '@enumInventoryStatuses'
        status: 'enabled'
        taxCode: '@taxable_vat22'
        __calls:
            - setDefaultName: ['Product 2 VAT22']
    product3:
        type: 'simple'
        organization: '@organization'
        owner: '@business_unit'
        sku: 'DISCOUNT-TAX-P3'
        attributeFamily: '@defaultProductFamily'
        primaryUnitPrecision: '@product3_precision'
        inventoryStatus: '@enumInventoryStatuses'
        status: 'enabled'
        taxCode: '@taxable_vat22'
        __calls:
            - setDefaultName: ['Product 3 VAT22']

Oro\Bundle\PricingBundle\Entity\ProductPrice:
    price_product1:
        product: '@product1'
        priceList: '@defaultPriceList'
        currency: 'USD'
        quantity: 1
        unit: '@piece'
        value: 10.95
    price_product2:
        product: '@product2'
        priceList: '@defaultPriceList'
        currency: 'USD'
        quantity: 1
        unit: '@piece'
        value: 2.88
    price_product3:
        product: '@product3'
        priceList: '@defaultPriceList'
        currency: 'USD'
        quantity: 1
        unit: '@piece'
        value: 350.00

Oro\Bundle\PricingBundle\Entity\PriceListToProduct:
    price_relation1:
        product: '@product1'
        priceList: '@defaultPriceList'
    price_relation2:
        product: '@product2'
        priceList: '@defaultPriceList'
    price_relation3:
        product: '@product3'
        priceList: '@defaultPriceList'

Oro\Bundle\ShoppingListBundle\Entity\ShoppingList:
    shoppinglist1:
        label: 'List 1'
        customer: '@customer1'
        customerUser: '@amanda'
        organization: '@organization'
        owner: '@admin'
        website: '@website1'
    shoppinglist2:
        label: 'List 2'
        customer: '@customer1'
        customerUser: '@amanda'
        organization: '@organization'
        owner: '@admin'
        website: '@website1'

Oro\Bundle\ShoppingListBundle\Entity\LineItem:
    lineitem1:
        product: '@product1'
        quantity: '1'
        unit: '@piece'
        customerUser: '@amanda'
        shoppingList: '@shoppinglist1'
        organization: '@organization'
        owner: '@admin'
    lineitem2:
        product: '@product2'
        quantity: '5'
        unit: '@piece'
        customerUser: '@amanda'
        shoppingList: '@shoppinglist1'
        organization: '@organization'
        owner: '@admin'
    lineitem3:
        product: '@product3'
        quantity: '1'
        unit: '@piece'
        customerUser: '@amanda'
        shoppingList: '@shoppinglist1'
        organization: '@organization'
        owner: '@admin'
    lineitem4:
        product: '@product1'
        quantity: '1'
        unit: '@piece'
        customerUser: '@amanda'
