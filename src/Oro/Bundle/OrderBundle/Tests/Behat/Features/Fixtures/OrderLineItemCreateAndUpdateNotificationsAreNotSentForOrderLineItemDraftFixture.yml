include:
    - '@OroOrderBundle:order.yml'

Oro\Bundle\EmailBundle\Entity\EmailTemplate:
    orderLineItemCreateNotificationTemplate:
        organization: '@organization'
        is_system: 0
        name: 'order_line_item_create_notification_test'
        entity_name: 'Oro\\Bundle\\OrderBundle\\Entity\\OrderLineItem'
        type: 'html'
        subject: 'Order Line Item Create Test Notification'
        content: 'Order line item has been created'
    orderLineItemUpdateNotificationTemplate:
        organization: '@organization'
        is_system: 0
        name: 'order_line_item_update_notification_test'
        entity_name: 'Oro\\Bundle\\OrderBundle\\Entity\\OrderLineItem'
        type: 'html'
        subject: 'Order Line Item Update Test Notification'
        content: 'Order line item has been updated'

