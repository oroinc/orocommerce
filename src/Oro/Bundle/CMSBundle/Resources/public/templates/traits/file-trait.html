<div class="<%- ppfx %>file-trait">
    <button type="button" class="<%- ppfx %>btn-prim <%- ppfx %>file-trait-btn"
        data-action="choose"><%- buttonText %></button>
    <div class="<%- ppfx %>file-trait-info" style="display: none">
        <span class="<%- ppfx %>file-trait-name" data-role="file-name"></span>
        <button type="button" class="<%- ppfx %>file-trait-clear"
            data-action="clear"><i class="fa fa-close"></i></button>
    </div>
</div>
